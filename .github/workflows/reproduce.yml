name: reproduce

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  reproduce:
    name: Reproduce on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v

      - name: Recompute closures
        run: python ./src/recompute_loop_closures.py

      - name: Negative controls
        run: python ./src/run_negative_controls.py

      - name: Validate reclassifications
        run: python ./src/validate_reclassification.py

      - name: Regenerate figures
        run: python ./src/make_figures.py

      - name: Verify SHA256
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd data
          sha256sum -c SHA256SUMS

      - name: Upload outputs artifact
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            outputs/
            paper/figures/
          retention-days: 30
